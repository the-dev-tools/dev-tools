version: 1.0
name: User Authentication Flow
description: Test authentication with various scenarios

# Global environment variables
env:
  base_url: "https://api.example.com"
  api_version: "v1"

# Request templates for reuse
requests:
  login_template:
    method: POST
    path: "/auth/login"
    headers:
      Content-Type: "application/json"
      X-API-Version: "1.0"
      Accept: "application/json"
    body:
      type: json
      content: |
        {
          "email": "{{ email }}",
          "password": "{{ password }}"
        }

  get_profile_template:
    method: GET
    path: "/users/{{ user_id }}/profile"
    headers:
      Authorization: "Bearer {{ token }}"
      X-API-Version: "1.0"
    queries:
      include: "preferences"
      format: "full"

# The actual workflow steps
steps:
  - name: Login as admin
    use_request: login_template
    headers:
      X-API-Version: "2.0"  # Override from 1.0
      X-Client-ID: "admin-client"  # New header not in template
    body:
      type: json
      content: |
        {
          "email": "admin@example.com",
          "password": "{{ env.admin_password }}",
          "role": "admin"
        }
    save:
      admin_token: "response.body.token"
      admin_id: "response.body.user_id"

  - name: Get admin profile
    use_request: get_profile_template
    path: "/users/{{ admin_id }}/profile"  # Override with flow variable
    headers:
      Authorization: "Bearer {{ admin_token }}"  # Override with flow variable
      X-Admin-Access: "true"  # New header
    queries:
      include: "permissions,audit_log"  # Override from "preferences"
      admin_view: "true"  # New query param
    save:
      admin_data: "response.body"

  - name: Create test user
    method: POST
    path: "/admin/users"
    headers:
      Authorization: "Bearer {{ admin_token }}"
      Content-Type: "application/json"
      X-Admin-Operation: "create_user"
    body:
      type: json
      content: |
        {
          "email": "testuser@example.com",
          "password": "{{ test_password }}",
          "role": "user"
        }
    save:
      test_user_id: "response.body.id"
      test_user_email: "response.body.email"